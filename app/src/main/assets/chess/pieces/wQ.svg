<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
    <g fill="#FFFFFF" stroke="#000000" stroke-width="4" stroke-linejoin="round">
        <!-- Base (aligned to baseline y=80, like Bishop) -->
        <rect x="28" y="80" width="44" height="8" rx="2" />
        <!-- Body moved down (approx +10 compared to previous) -->
        <rect x="30" y="55" width="40" height="25" rx="6" />
        <!-- Crown elements moved down accordingly -->
        <polygon points="30,55 40,35 50,55" />
        <polygon points="50,55 60,35 70,55" />
        <polygon points="47,55 50,30 53,55" />
    </g>
</svg>