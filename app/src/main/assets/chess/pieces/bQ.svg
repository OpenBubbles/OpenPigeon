<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
<g fill="#000000" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
    <!-- base moved down to y=80 with height 8 (matches Bishop style) -->
    <rect x="28" y="80" width="44" height="8" rx="2" />
    <!-- body moved down +10 -->
    <rect x="30" y="55" width="40" height="25" rx="6" />
    <!-- crowns/top pieces moved down +10 -->
    <polygon points="30,55 40,35 50,55" />
    <polygon points="50,55 60,35 70,55" />
    <polygon points="47,55 50,30 53,55" />
</g>
</svg>
